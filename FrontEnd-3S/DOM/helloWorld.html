<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="titulo">Olá, sou o título da página.</h1>
    <button onclick="saudacao()">Clique aqui</button> <br>
    <button onmousemove="mouseMoveu()">Passe o mouse aqui</button> <br>
    <button onmousedown="clicouBaixo()">Clique e segure</button> <br>
    <button onmouseup="clicouCima()">Solte o mouse aqui</button> <br>
    <button ondblclick="clicouDuasVezes()">Clique duas vezes</button>

    <script>    
        function saudacao() {
            alert(`Titulo: ${document.getElementById('titulo').textContent}`);
        }

        function mouseMoveu() {
            alert("Mouse se moveu no botão!");
        }

        function clicouBaixo() {
            alert("Mouse clicou no botão!");
        }

        function clicouCima() {
            alert("Mouse soltou o botão!");
        }

        function clicouDuasVezes() {
            alert("Mouse clicou duas vezes no botão!");
        }
            
    </script>
</body>
</html>
